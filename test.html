<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase 測試</title>
<style>body{font-family:sans-serif;padding:20px;} .ok{color:green;} .err{color:red;} pre{background:#f4f4f4;padding:10px;border-radius:8px;font-size:12px;word-break:break-all;}</style>
</head>
<body>
<h2>Firebase 連線測試</h2>
<div id="log"></div>
<script>
const DB = "https://family-food-2ce0d-default-rtdb.firebaseio.com";

function log(msg, ok) {
  const d = document.createElement('p');
  d.className = ok ? 'ok' : 'err';
  d.textContent = (ok ? '✅ ' : '❌ ') + msg;
  document.getElementById('log').appendChild(d);
}

async function test() {
  log('開始測試...', true);
  
  // Test 1: Basic fetch
  try {
    log('測試 1：嘗試連接 Firebase...', true);
    const r = await fetch(`${DB}/test.json`);
    log(`HTTP 狀態：${r.status}`, r.ok);
    const data = await r.text();
    log(`回應內容：${data}`, true);
  } catch(e) {
    log(`錯誤：${e.message}`, false);
  }

  // Test 2: Write test
  try {
    log('測試 2：嘗試寫入...', true);
    const r = await fetch(`${DB}/test.json`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({time: Date.now(), msg: 'hello'})
    });
    log(`寫入狀態：${r.status}`, r.ok);
    const data = await r.text();
    log(`寫入回應：${data}`, true);
  } catch(e) {
    log(`寫入錯誤：${e.message}`, false);
  }

  // Test 3: Read foods_v2
  try {
    log('測試 3：讀取 foods_v2...', true);
    const r = await fetch(`${DB}/foods_v2.json`);
    const data = await r.text();
    log(`foods_v2 內容：${data.substring(0,100)}`, true);
  } catch(e) {
    log(`讀取錯誤：${e.message}`, false);
  }
}

test();
</script>
</body>
</html>

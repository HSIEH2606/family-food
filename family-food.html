<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭管家</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F7F4EF;
  --white: #FFFFFF;
  --green: #3A6B4A;
  --green-mid: #5A8F6A;
  --green-light: #EAF2EC;
  --orange: #D4621A;
  --orange-light: #FDF0E8;
  --red: #C0392B;
  --red-light: #FEF2F2;
  --yellow: #D4A017;
  --yellow-light: #FFFBEB;
  --blue: #2563EB;
  --blue-light: #EFF6FF;
  --purple: #7C3AED;
  --purple-light: #F5F3FF;
  --teal: #0D9488;
  --teal-light: #F0FDFA;
  --text: #1C1C1C;
  --text-mid: #4A4A4A;
  --text-muted: #888;
  --border: #E4DDD4;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.07);
  --shadow: 0 3px 12px rgba(0,0,0,.09);
  --shadow-lg: 0 8px 28px rgba(0,0,0,.15);
  --radius: 14px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Segoe UI', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

/* HEADER */
header { background: var(--green); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 10px rgba(0,0,0,.18); }
.logo { font-size: 16px; font-weight: 700; color: white; display: flex; align-items: center; gap: 7px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.sync-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.sync-badge.online { background: rgba(255,255,255,.15); color: #A7F3D0; }
.sync-badge.offline { background: rgba(255,100,100,.2); color: #FCA5A5; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; }
.sync-badge.online .sync-dot { background: #34D399; animation: pulse 2s infinite; }
.sync-badge.offline .sync-dot { background: #F87171; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.user-btn { background: rgba(255,255,255,.2); color: white; border: none; border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
.user-btn:hover { background: rgba(255,255,255,.3); }

/* MAIN TABS */
.main-tabs { background: var(--green); display: flex; padding: 0 16px 12px; gap: 8px; }
.main-tab { flex: 1; padding: 8px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; text-align: center; transition: all .15s; }
.main-tab.active { background: white; color: var(--green); }
.main-tab:not(.active) { background: rgba(255,255,255,.15); color: rgba(255,255,255,.85); }

main { max-width: 1100px; margin: 0 auto; padding: 18px 14px 60px; }

/* LOADING */
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; color: var(--text-muted); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* STATS */
.stats { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.stat { background: var(--white); border-radius: 12px; padding: 11px 13px; box-shadow: var(--shadow-sm); flex: 1; min-width: 80px; cursor: pointer; transition: box-shadow .15s; }
.stat:hover { box-shadow: var(--shadow); }
.stat-num { font-size: 22px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .3px; margin-top: 3px; }
.stat.green .stat-num { color: var(--green); }
.stat.orange .stat-num { color: var(--orange); }
.stat.red .stat-num { color: var(--red); }
.stat.blue .stat-num { color: var(--blue); }
.stat.teal .stat-num { color: var(--teal); }

/* TOOLBAR */
.toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
.search-wrap { position: relative; flex: 1; min-width: 140px; }
.search-wrap input { width: 100%; padding: 9px 12px 9px 33px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--white); outline: none; color: var(--text); transition: border-color .15s; }
.search-wrap input:focus { border-color: var(--green-mid); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 13px; }
.filter-select { padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 12px; background: var(--white); outline: none; color: var(--text); cursor: pointer; }
.btn-add { background: var(--green); color: white; border: none; padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background .15s; }
.btn-add:hover { background: #2F5840; }

/* FILTER TABS */
.filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.ftab { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--white); color: var(--text-mid); transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 3px; }
.ftab.active { color: white; border-color: transparent; background: var(--green); }
.ftab.house-active { color: white; border-color: transparent; background: var(--blue); }
.ftab-cnt { font-size: 10px; padding: 1px 5px; border-radius: 10px; background: var(--green-light); color: var(--green); }
.ftab.active .ftab-cnt, .ftab.house-active .ftab-cnt { background: rgba(255,255,255,.25); color: white; }

/* GRID */
.food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 12px; }

/* CARD */
.food-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; transition: box-shadow .18s, transform .18s; position: relative; cursor: pointer; }
.food-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.card-photo { width: 100%; aspect-ratio: 4/3; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 46px; overflow: hidden; position: relative; }
.card-photo img { width: 100%; height: 100%; object-fit: cover; }
.card-badges { position: absolute; top: 7px; left: 7px; display: flex; flex-direction: column; gap: 3px; }
.cbadge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 20px; }
.cbadge-expired { background: var(--red); color: white; }
.cbadge-warn { background: var(--orange); color: white; }
.cbadge-opened { background: var(--orange); color: white; }
.cbadge-house { position: absolute; top: 7px; right: 7px; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 20px; }
.cbadge-new { background: var(--blue); color: white; }
.cbadge-old { background: #6B7280; color: white; }

/* QUICK BAR */
.quick-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: #F8FAF8; border-bottom: 1px solid var(--border); }
.quick-controls { display: flex; align-items: center; gap: 5px; }
.qty-btn { width: 24px; height: 24px; border-radius: 6px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--text-mid); transition: all .12s; font-weight: 700; }
.qty-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
.qty-btn.minus:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
.qty-num { font-weight: 800; font-size: 13px; min-width: 36px; text-align: center; color: var(--text); }
.btn-used-up { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 6px; border: none; background: var(--red-light); color: var(--red); cursor: pointer; white-space: nowrap; }
.btn-used-up:hover { background: #FEE2E2; }

.card-body { padding: 9px 11px 8px; }
.card-name { font-size: 14px; font-weight: 700; margin-bottom: 5px; line-height: 1.3; }
.batch-count { font-size: 10px; color: var(--text-muted); margin-left: 4px; font-weight: 500; }

/* EXPIRY */
.expiry-bar-wrap { margin-bottom: 5px; }
.expiry-row { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
.expiry-right { display: flex; align-items: center; gap: 4px; }
.expiry-days { font-weight: 700; font-size: 11px; }
.expiry-date { font-size: 10px; color: var(--text-muted); }
.expiry-days.ok { color: var(--green); }
.expiry-days.warn30 { color: var(--yellow); }
.expiry-days.warn7 { color: var(--orange); }
.expiry-days.urgent { color: var(--orange); }
.expiry-days.expired { color: var(--red); }
.ebar { height: 4px; border-radius: 3px; background: #EEE; overflow: hidden; }
.efill { height: 100%; border-radius: 3px; }
.efill.ok { background: var(--green-mid); }
.efill.warn30 { background: var(--yellow); }
.efill.warn7 { background: var(--orange); }
.efill.urgent { background: var(--orange); }
.efill.expired { background: var(--red); }

.card-chips { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 5px; }
.chip { font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 600; }
.chip-zone { background: var(--green-light); color: var(--green); }
.chip-loc { background: #EEF2FF; color: #4338CA; }
.chip-open { background: var(--orange-light); color: var(--orange); }
.chip-sealed { background: var(--green-light); color: var(--green); }
.chip-maint { background: var(--teal-light); color: var(--teal); }
.card-updated { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; }
.card-actions { display: flex; gap: 5px; }
.card-btn { flex: 1; padding: 6px; border-radius: 7px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; }
.card-btn-edit { background: var(--green-light); color: var(--green); }
.card-btn-edit:hover { background: #D5EAD9; }
.card-btn-del { background: var(--red-light); color: var(--red); }
.card-btn-del:hover { background: #FEE2E2; }

/* MAINTENANCE CARD */
.maint-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; transition: box-shadow .18s, transform .18s; cursor: pointer; }
.maint-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.maint-header { padding: 12px 12px 8px; }
.maint-icon { font-size: 28px; margin-bottom: 6px; }
.maint-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.maint-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
.maint-body { padding: 0 12px 10px; }

/* EMPTY */
.empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-emoji { font-size: 44px; margin-bottom: 10px; }

/* DETAIL OVERLAY */
.detail-overlay { position: fixed; inset: 0; background: rgba(28,28,28,.55); z-index: 400; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
.detail-overlay.open { opacity: 1; pointer-events: all; }
.detail-sheet { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; padding: 20px; transform: translateY(100%); transition: transform .25s ease; }
.detail-overlay.open .detail-sheet { transform: translateY(0); }
.detail-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.detail-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.detail-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.batch-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.batch-item { background: var(--cream); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
.batch-info { flex: 1; }
.batch-qty { font-size: 14px; font-weight: 700; }
.batch-expiry { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.batch-note { font-size: 11px; color: var(--text-muted); }
.batch-days { font-size: 12px; font-weight: 700; text-align: right; min-width: 60px; }
.batch-actions { display: flex; gap: 5px; }
.batch-btn { padding: 4px 9px; border-radius: 6px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; }
.batch-btn-use { background: var(--orange-light); color: var(--orange); }
.batch-btn-del { background: var(--red-light); color: var(--red); }
.btn-add-batch { width: 100%; padding: 10px; border-radius: 10px; border: 2px dashed var(--border); background: transparent; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all .15s; margin-bottom: 16px; }
.btn-add-batch:hover { border-color: var(--green-mid); color: var(--green); }
.detail-info { background: var(--cream); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
.detail-info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.detail-info-row:last-child { border-bottom: none; }
.detail-info-label { color: var(--text-muted); font-weight: 600; }
.detail-footer { display: flex; gap: 8px; }
.btn-detail-edit { flex: 1; padding: 10px; border-radius: 10px; background: var(--green-light); color: var(--green); border: none; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-detail-del { padding: 10px 16px; border-radius: 10px; background: var(--red-light); color: var(--red); border: none; font-size: 13px; font-weight: 700; cursor: pointer; }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(28,28,28,.55); z-index: 300; display: flex; align-items: flex-start; justify-content: center; padding: 14px; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity .2s; }
.overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 500px; padding: 22px; box-shadow: var(--shadow-lg); transform: translateY(16px); transition: transform .22s; margin: auto; }
.overlay.open .modal { transform: translateY(0); }
.modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 17px; font-weight: 800; color: var(--green); }
.modal-close { width: 28px; height: 28px; border-radius: 8px; border: none; background: var(--cream); cursor: pointer; font-size: 16px; color: var(--text-mid); display: flex; align-items: center; justify-content: center; }
.photo-area { border: 2px dashed var(--border); border-radius: 12px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 14px; position: relative; overflow: hidden; background: var(--cream); transition: border-color .15s; }
.photo-area:hover { border-color: var(--green-mid); }
.photo-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
.photo-hint { font-size: 12px; color: var(--text-muted); text-align: center; pointer-events: none; }
.photo-hint .icon { font-size: 22px; margin-bottom: 2px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.form-row { }
.form-row.full { grid-column: 1/-1; }
.form-row label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
.form-input, .form-select { width: 100%; padding: 9px 10px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 13px; color: var(--text); outline: none; background: var(--white); transition: border-color .15s; font-family: inherit; }
.form-input:focus, .form-select:focus { border-color: var(--green-mid); }
.zone-selector { display: flex; gap: 5px; }
.zone-opt { flex: 1; padding: 7px 4px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--cream); cursor: pointer; text-align: center; transition: all .15s; font-size: 11px; font-weight: 600; color: var(--text-mid); }
.zone-opt .zicon { font-size: 16px; display: block; margin-bottom: 2px; }
.zone-opt.selected { border-color: var(--green); background: var(--green-light); color: var(--green); }
.toggle-row { display: flex; gap: 7px; }
.toggle-opt { flex: 1; padding: 8px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--cream); cursor: pointer; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-mid); transition: all .15s; }
.toggle-opt.sel-new { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
.toggle-opt.sel-old { border-color: #6B7280; background: #F3F4F6; color: #374151; }
.toggle-opt.sel-open { border-color: var(--orange); background: var(--orange-light); color: var(--orange); }
.toggle-opt.sel-sealed { border-color: var(--green); background: var(--green-light); color: var(--green); }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
.btn-cancel { padding: 9px 14px; border-radius: 9px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: var(--white); color: var(--text-mid); cursor: pointer; }
.btn-save { padding: 9px 18px; border-radius: 9px; font-size: 13px; font-weight: 700; border: none; background: var(--green); color: white; cursor: pointer; }
.btn-save:disabled { background: #aaa; cursor: not-allowed; }

/* USER MODAL */
.user-modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 340px; padding: 24px; box-shadow: var(--shadow-lg); margin: auto; }
.user-modal h2 { font-size: 17px; font-weight: 800; color: var(--green); margin-bottom: 5px; }
.user-modal p { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.user-presets { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.user-preset { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--cream); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-mid); transition: all .15s; }
.user-preset.selected, .user-preset:hover { border-color: var(--green); background: var(--green-light); color: var(--green); }
.user-input-row { display: flex; gap: 8px; }
.user-input-row input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 13px; outline: none; font-family: inherit; }
.user-input-row input:focus { border-color: var(--green-mid); }
.btn-confirm { padding: 9px 16px; border-radius: 9px; font-size: 13px; font-weight: 700; border: none; background: var(--green); color: white; cursor: pointer; }

/* TOASTS */
.toasts { position: fixed; bottom: 18px; right: 18px; z-index: 600; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; color: white; box-shadow: var(--shadow); transform: translateX(120%); transition: transform .25s ease; max-width: 250px; }
.toast.show { transform: translateX(0); }
.toast.ok { background: var(--green); }
.toast.warn { background: var(--orange); }
.toast.err { background: var(--red); }

@media (max-width: 560px) {
  .food-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .form-grid { grid-template-columns: 1fr; }
  .stats { gap: 6px; }
  .stat { min-width: 70px; padding: 10px 10px; }
}
@media (max-width: 320px) { .food-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo">🏡 家庭管家</div>
  <div class="header-right">
    <button class="user-btn" id="userBtn" onclick="openUserModal()">👤 <span id="userNameDisplay">設定名字</span></button>
    <div class="sync-badge offline" id="syncBadge"><span class="sync-dot"></span><span id="syncText">連線中</span></div>
  </div>
</header>

<div class="main-tabs">
  <button class="main-tab active" id="tab-food" onclick="switchTab('food')">🥦 食材管理</button>
  <button class="main-tab" id="tab-maint" onclick="switchTab('maint')">🔧 耗材保養</button>
</div>

<main>
  <div class="loading-screen" id="loadingScreen"><div class="spinner"></div><div>連接資料庫中…</div></div>

  <!-- FOOD TAB -->
  <div id="foodTab" style="display:none">
    <div class="stats">
      <div class="stat green"><div class="stat-num" id="sTotal">0</div><div class="stat-label">食材</div></div>
      <div class="stat teal"><div class="stat-num" id="sOpened">0</div><div class="stat-label">已開封</div></div>
      <div class="stat orange" onclick="filterWarn()"><div class="stat-num" id="sWarn">0</div><div class="stat-label">月內到期</div></div>
      <div class="stat red" onclick="filterExpired()"><div class="stat-num" id="sExpired">0</div><div class="stat-label">已過期</div></div>
    </div>
    <div class="toolbar">
      <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="搜尋食材…" oninput="renderFood()"></div>
      <select class="filter-select" id="catFilter" onchange="renderFood()"><option value="">全部類別</option></select>
      <select class="filter-select" id="sortSel" onchange="renderFood()">
        <option value="expiry">依到期日</option>
        <option value="name">依名稱</option>
        <option value="zone">依溫層</option>
        <option value="updated">最新更新</option>
      </select>
      <button class="btn-add" onclick="openFoodModal()">＋ 新增</button>
    </div>
    <div class="filter-row">
      <div class="ftab active" data-zone="" onclick="setZone(this)">全部 <span class="ftab-cnt" id="cnt-all">0</span></div>
      <div class="ftab" data-zone="冷凍" onclick="setZone(this)">❄️ 冷凍 <span class="ftab-cnt" id="cnt-冷凍">0</span></div>
      <div class="ftab" data-zone="冷藏" onclick="setZone(this)">🌡️ 冷藏 <span class="ftab-cnt" id="cnt-冷藏">0</span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyARi04N76FQgIJjRulKZGbg-xASHL7GzCA",
  authDomain: "family-food-2ce0d.firebaseapp.com",
  databaseURL: "https://family-food-2ce0d-default-rtdb.firebaseio.com",
  projectId: "family-food-2ce0d",
  storageBucket: "family-food-2ce0d.firebasestorage.app",
  messagingSenderId: "250652722667",
  appId: "1:250652722667:web:6a1c0c09aa01ef66bf45ae"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const foodsRef = ref(db, 'foods_v2');
const maintsRef = ref(db, 'maints');
const usersRef = ref(db, 'users');

// STATE
let foods = []; // [{_key, name, zone, house, category, location, opened, note, photo, batches:{key:{qty,expiry,note}}, updatedAt, updatedBy}]
let maints = [];
let currentTab = 'food';
let activeZone = '', activeHouse = '', activeMHouse = '';
let filterMode = '';
let photoBuf = null;
let editFoodKey = null, editMaintKey = null, detailKey = null;
let currentUser = localStorage.getItem('food_username') || '';
let knownUsers = [];

const ZONES = ['冷凍','冷藏','常溫','乾燥'];
const ZONE_ICONS = {'冷凍':'❄️','冷藏':'🌡️','常溫':'🏠','乾燥':'🌾'};
const CAT_EMOJI = {'肉類':'🥩','魚類':'🐟','海鮮':'🦐','蔬菜':'🥦','水果':'🍎','乳製品':'🥛','蛋類':'🥚','主食':'🍚','調味料':'🧂','飲料':'🧃','零食':'🍪','麵包':'🍞'};
const MAINT_EMOJI = {'濾芯':'💧','濾網':'🌀','電池':'🔋','燈泡':'💡','清潔':'🧹','冷氣':'❄️','熱水器':'🚿','保養':'🔧'};

if (!currentUser) setTimeout(() => openUserModal(), 600);
else document.getElementById('userNameDisplay').textContent = currentUser;

// FIREBASE
onValue(foodsRef, snap => {
  document.getElementById('loadingScreen').style.display = 'none';
  showTab(currentTab);
  setBadge(true);
  const data = snap.val();
  foods = data ? Object.entries(data).map(([k,v]) => ({...v, _key:k})) : [];
  if (foods.length === 0) seedFoods();
  renderFood();
});
onValue(maintsRef, snap => {
  const data = snap.val();
  maints = data ? Object.entries(data).map(([k,v]) => ({...v, _key:k})) : [];
  renderMaint();
});
onValue(usersRef, snap => {
  const data = snap.val();
  knownUsers = data ? Object.values(data) : [];
  refreshUserPresets();
});

function setBadge(ok) {
  const b = document.getElementById('syncBadge');
  b.className = 'sync-badge ' + (ok ? 'online' : 'offline');
  document.getElementById('syncText').textContent = ok ? '即時同步' : '連線失敗';
}

function seedFoods() {
  const d = n => { const x=new Date(); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); };
  [
    {name:'雞胸肉',zone:'冷凍',house:'新家',category:'肉類',location:'冷凍下層',opened:'未開封',note:'已分裝',photo:null,batches:{b1:{qty:'2包',expiry:d(5),note:''},b2:{qty:'1包',expiry:d(45),note:''}}},
    {name:'牛奶',zone:'冷藏',house:'新家',category:'乳製品',location:'門架',opened:'已開封',note:'',photo:null,batches:{b1:{qty:'1瓶',expiry:d(6),note:''}}},
    {name:'白米',zone:'乾燥',house:'舊家',category:'主食',location:'米桶',opened:'未開封',note:'',photo:null,batches:{b1:{qty:'5kg',expiry:d(180),note:''}}},
  ].forEach(s => push(foodsRef, {...s, addedAt:Date.now(), updatedAt:Date.now(), updatedBy:'系統'}));
}

// UTILS
function daysLeft(exp) { if(!exp) return null; return Math.floor((new Date(exp)-new Date())/86400000); }
function expClass(d) {
  if(d===null) return 'ok';
  if(d<0) return 'expired';
  if(d<=7) return 'warn7';
  if(d<=30) return 'warn30';
  return 'ok';
}
function expText(d) { if(d===null)return'未設定'; if(d<0)return`過期${Math.abs(d)}天`; if(d===0)return'今天到期'; if(d===1)return'明天'; return`剩${d}天`; }
function fmtDate(s) { if(!s)return''; const p=s.split('-'); return `${parseInt(p[1])}/${parseInt(p[2])}`; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(ts) { if(!ts)return''; const d=Math.floor((Date.now()-ts)/1000); if(d<60)return'剛剛'; if(d<3600)return`${Math.floor(d/60)}分鐘前`; if(d<86400)return`${Math.floor(d/3600)}小時前`; if(d<604800)return`${Math.floor(d/86400)}天前`; return new Date(ts).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}); }

function getBatches(food) {
  return food.batches ? Object.entries(food.batches).map(([k,v])=>({...v,_bkey:k})) : [];
}
function getEarliestBatch(food) {
  const bs = getBatches(food).filter(b=>b.expiry);
  if(!bs.length) return getBatches(food)[0]||null;
  return bs.sort((a,b)=>new Date(a.expiry)-new Date(b.expiry))[0];
}
function getTotalQty(food) {
  return getBatches(food).map(b=>b.qty||'').filter(Boolean).join(' + ') || '—';
}

// TAB SWITCH
window.switchTab = function(tab) {
  currentTab = tab;
  document.getElementById('tab-food').className = 'main-tab' + (tab==='food'?' active':'');
  document.getElementById('tab-maint').className = 'main-tab' + (tab==='maint'?' active':'');
  showTab(tab);
}
function showTab(tab) {
  document.getElementById('foodTab').style.display = tab==='food'?'block':'none';
  document.getElementById('maintTab').style.display = tab==='maint'?'block':'none';
}

// FOOD RENDER
window.renderFood = function() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const sort = document.getElementById('sortSel').value;

  let list = foods.filter(i => {
    const mQ = !q||(i.name||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q);
    const mC = !cat||i.category===cat;
    const mZ = !activeZone||i.zone===activeZone;
    const mH = !activeHouse||i.house===activeHouse;
    const eb = getEarliestBatch(i);
    const d = eb?daysLeft(eb.expiry):null;
    const mF = !filterMode||(filterMode==='warn'&&d!==null&&d>=0&&d<=30)||(filterMode==='expired'&&d!==null&&d<0);
    return mQ&&mC&&mZ&&mH&&mF;
  });

  list.sort((a,b) => {
    if(sort==='expiry') {
      const ea=getEarliestBatch(a), eb2=getEarliestBatch(b);
      const da=ea?daysLeft(ea.expiry)??9999:9999, db2=eb2?daysLeft(eb2.expiry)??9999:9999;
      return da-db2;
    }
    if(sort==='name') return (a.name||'').localeCompare(b.name||'','zh-TW');
    if(sort==='zone') return ZONES.indexOf(a.zone)-ZONES.indexOf(b.zone);
    return (b.updatedAt||0)-(a.updatedAt||0);
  });

  // Stats
  document.getElementById('sTotal').textContent = foods.length;
  document.getElementById('sOpened').textContent = foods.filter(i=>i.opened==='已開封').length;
  document.getElementById('sWarn').textContent = foods.filter(i=>{const eb=getEarliestBatch(i);const d=eb?daysLeft(eb.expiry):null;return d!==null&&d>=0&&d<=30;}).length;
  document.getElementById('sExpired').textContent = foods.filter(i=>{const eb=getEarliestBatch(i);const d=eb?daysLeft(eb.expiry):null;return d!==null&&d<0;}).length;

  document.getElementById('cnt-all').textContent = foods.length;
  ZONES.forEach(z=>{const el=document.getElementById('cnt-'+z);if(el)el.textContent=foods.filter(i=>i.zone===z).length;});
  document.getElementById('hcnt-all').textContent = foods.length;
  ['新家','舊家'].forEach(h=>{const el=document.getElementById('hcnt-'+h);if(el)el.textContent=foods.filter(i=>i.house===h).length;});

  const cats = [...new Set(foods.map(i=>i.category).filter(Boolean))].sort();
  const cf = document.getElementById('catFilter'); const prev=cf.value;
  cf.innerHTML='<option value="">全部類別</option>'+cats.map(c=>`<option value="${esc(c)}"${c===prev?' selected':''}>${esc(c)}</option>`).join('');
  document.getElementById('catDL').innerHTML=cats.map(c=>`<option value="${esc(c)}">`).join('');

  const grid = document.getElementById('foodGrid');
  if(!list.length){grid.innerHTML=`<div class="empty"><div class="empty-emoji">🥡</div><p>沒有符合的食材</p></div>`;return;}

  grid.innerHTML = list.map(item => {
    const eb = getEarliestBatch(item);
    const d = eb ? daysLeft(eb.expiry) : null;
    const cls = expClass(d);
    const fill = d===null?100:Math.max(3,Math.min(100,(d/90)*100));
    const totalQty = getTotalQty(item);
    const batchCount = getBatches(item).length;
    const photo = item.photo?`<img src="${item.photo}" alt="">`:(CAT_EMOJI[item.category]||'🥡');
    const isExpired = d!==null&&d<0;
    const isWarn = d!==null&&d>=0&&d<=7;

    return `<div class="food-card" onclick="openDetail('${item._key}')">
      <div class="card-photo">${photo}
        <div class="card-badges">
          ${isExpired?`<span class="cbadge cbadge-expired">已過期</span>`:''}
          ${isWarn&&!isExpired?`<span class="cbadge cbadge-warn">快到期</span>`:''}
          ${item.opened==='已開封'?`<span class="cbadge cbadge-opened">已開封</span>`:''}
        </div>
        <span class="cbadge-house ${item.house==='新家'?'cbadge-new':'cbadge-old'}">${item.house==='新家'?'🏠':'🏡'} ${esc(item.house)}</span>
      </div>
      <div class="quick-bar" onclick="event.stopPropagation()">
        <div class="quick-controls">
          <button class="qty-btn minus" onclick="quickMinus('${item._key}')">−</button>
          <span class="qty-num">${esc(totalQty)}</span>
          <button class="qty-btn" onclick="openBatchModalDirect('${item._key}')">＋</button>
          <button class="btn-used-up" onclick="markEarliestUsed('${item._key}','${esc(item.name)}')">用完</button>
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${esc(item.name)}${batchCount>1?`<span class="batch-count">${batchCount}批</span>`:''}</div>
        ${eb&&eb.expiry?`<div class="expiry-bar-wrap">
          <div class="expiry-row">
            <span>最早到期</span>
            <div class="expiry-right">
              <span class="expiry-days ${cls}">${expText(d)}</span>
              <span class="expiry-date">· ${fmtDate(eb.expiry)}</span>
            </div>
          </div>
          <div class="ebar"><div class="efill ${cls}" style="width:${fill}%"></div></div>
        </div>`:''}
        <div class="card-chips">
          <span class="chip chip-zone">${ZONE_ICONS[item.zone]||''} ${esc(item.zone)}</span>
          ${item.location?`<span class="chip chip-loc">📍${esc(item.location)}</span>`:''}
        </div>
        ${item.updatedBy?`<div class="card-updated">✏️ ${esc(item.updatedBy)} · ${timeAgo(item.updatedAt)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// MAINT RENDER
window.renderMaint = function() {
  const q = document.getElementById('mSearchInput').value.toLowerCase();
  const cat = document.getElementById('mCatFilter').value;

  let list = maints.filter(i => {
    const mQ = !q||(i.name||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q);
    const mC = !cat||i.category===cat;
    const mH = !activeMHouse||i.house===activeMHouse;
    return mQ&&mC&&mH;
  });

  list.sort((a,b) => {
    const da = maintDaysLeft(a)??9999, db2 = maintDaysLeft(b)??9999;
    return da-db2;
  });

  document.getElementById('msTotal').textContent = maints.length;
  document.getElementById('msWarn').textContent = maints.filter(i=>{const d=maintDaysLeft(i);return d!==null&&d>=0&&d<=30;}).length;
  document.getElementById('msExpired').textContent = maints.filter(i=>{const d=maintDaysLeft(i);return d!==null&&d<0;}).length;
  document.getElementById('mhcnt-all').textContent = maints.length;
  ['新家','舊家'].forEach(h=>{const el=document.getElementById('mhcnt-'+h);if(el)el.textContent=maints.filter(i=>i.house===h).length;});

  const cats = [...new Set(maints.map(i=>i.category).filter(Boolean))].sort();
  const cf = document.getElementById('mCatFilter'); const prev=cf.value;
  cf.innerHTML='<option value="">全部類別</option>'+cats.map(c=>`<option value="${esc(c)}"${c===prev?' selected':''}>${esc(c)}</option>`).join('');
  document.getElementById('mCatDL').innerHTML=cats.map(c=>`<option value="${esc(c)}">`).join('');

  const grid = document.getElementById('maintGrid');
  if(!list.length){grid.innerHTML=`<div class="empty"><div class="empty-emoji">🔧</div><p>還沒有耗材紀錄</p></div>`;return;}

  grid.innerHTML = list.map(item => {
    const d = maintDaysLeft(item);
    const cls = expClass(d);
    const fill = d===null?100:Math.max(3,Math.min(100,(d/(item.cycle||90))*100));
    const nextDate = maintNextDate(item);
    const icon = MAINT_EMOJI[item.category]||'🔧';

    return `<div class="maint-card" onclick="openMaintDetail('${item._key}')">
      <div class="maint-header">
        <div class="maint-icon">${icon}</div>
        <div class="maint-name">${esc(item.name)}</div>
        <div class="maint-meta">
          ${item.house==='新家'?'🏠':'🏡'} ${esc(item.house)}
          ${item.location?` · 📍${esc(item.location)}`:''}
          ${item.brand?` · ${esc(item.brand)}`:''}
        </div>
      </div>
      <div class="maint-body">
        <div class="expiry-bar-wrap">
          <div class="expiry-row">
            <span>下次更換</span>
            <div class="expiry-right">
              <span class="expiry-days ${cls}">${expText(d)}</span>
              ${nextDate?`<span class="expiry-date">· ${fmtDate(nextDate)}</span>`:''}
            </div>
          </div>
          <div class="ebar"><div class="efill ${cls}" style="width:${fill}%"></div></div>
        </div>
        <div class="card-chips">
          ${item.category?`<span class="chip chip-maint">${esc(item.category)}</span>`:''}
          ${item.cycle?`<span class="chip chip-loc">每${item.cycle}天</span>`:''}
        </div>
        ${item.updatedBy?`<div class="card-updated">✏️ ${esc(item.updatedBy)} · ${timeAgo(item.updatedAt)}</div>`:''}
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="card-btn card-btn-edit" onclick="openMaintModal('${item._key}')">編輯</button>
          <button class="card-btn card-btn-edit" style="background:var(--teal-light);color:var(--teal)" onclick="markMaintDone('${item._key}','${esc(item.name)}')">已換✓</button>
          <button class="card-btn card-btn-del" onclick="deleteMaint('${item._key}','${esc(item.name)}')">刪除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function maintNextDate(item) {
  if(!item.lastDate||!item.cycle) return null;
  const d = new Date(item.lastDate); d.setDate(d.getDate()+parseInt(item.cycle));
  return d.toISOString().slice(0,10);
}
function maintDaysLeft(item) {
  const nd = maintNextDate(item);
  return nd ? daysLeft(nd) : null;
}

// DETAIL
window.openDetail = function(key) {
  detailKey = key;
  const item = foods.find(i=>i._key===key);
  if(!item) return;
  document.getElementById('detailTitle').textContent = item.name;
  document.getElementById('detailSub').textContent = `${ZONE_ICONS[item.zone]||''} ${item.zone} · ${item.house==='新家'?'🏠':'🏡'} ${item.house}${item.location?' · 📍'+item.location:''}`;
  renderBatchList(item);
  document.getElementById('detailInfo').innerHTML = `
    <div class="detail-info-row"><span class="detail-info-label">類別</span><span>${esc(item.category||'—')}</span></div>
    <div class="detail-info-row"><span class="detail-info-label">開封狀態</span><span>${esc(item.opened||'—')}</span></div>
    <div class="detail-info-row"><span class="detail-info-label">備註</span><span>${esc(item.note||'—')}</span></div>
    <div class="detail-info-row"><span class="detail-info-label">最後更新</span><span>${esc(item.updatedBy||'')} ${timeAgo(item.updatedAt)}</span></div>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function renderBatchList(item) {
  const bs = getBatches(item).sort((a,b)=>{
    const da=a.expiry?daysLeft(a.expiry):9999, db2=b.expiry?daysLeft(b.expiry):9999;
    return da-db2;
  });
  document.getElementById('batchList').innerHTML = bs.map(b => {
    const d = b.expiry?daysLeft(b.expiry):null;
    const cls = expClass(d);
    return `<div class="batch-item">
      <div class="batch-info">
        <div class="batch-qty">${esc(b.qty||'—')}</div>
        ${b.expiry?`<div class="batch-expiry">到期：${fmtDate(b.expiry)} ${b.expiry}</div>`:''}
        ${b.note?`<div class="batch-note">${esc(b.note)}</div>`:''}
      </div>
      <div class="batch-days expiry-days ${cls}">${b.expiry?expText(d):'—'}</div>
      <div class="batch-actions">
        <button class="batch-btn batch-btn-del" onclick="deleteBatch('${item._key}','${b._bkey}')">移除</button>
      </div>
    </div>`;
  }).join('');
}

window.detailOverlayClick = function(e) { if(e.target===document.getElementById('detailOverlay')) document.getElementById('detailOverlay').classList.remove('open'); }
window.editFromDetail = function() { document.getElementById('detailOverlay').classList.remove('open'); openFoodModal(detailKey); }
window.deleteFromDetail = function() {
  const item = foods.find(i=>i._key===detailKey);
  if(!item||!confirm(`確定刪除「${item.name}」？`)) return;
  remove(ref(db,`foods_v2/${detailKey}`));
  document.getElementById('detailOverlay').classList.remove('open');
  toast(`已刪除「${item.name}」`,'warn');
}

// BATCH
let batchTargetKey = null;
window.openBatchModal = function() { batchTargetKey=detailKey; openBatchModalFor(detailKey); }
window.openBatchModalDirect = function(key) { batchTargetKey=key; openBatchModalFor(key); }
function openBatchModalFor(key) {
  document.getElementById('bQty').value='';
  document.getElementById('bExpiry').value='';
  document.getElementById('bNote').value='';
  document.getElementById('batchOverlay').classList.add('open');
}
window.closeBatchModal = function() { document.getElementById('batchOverlay').classList.remove('open'); }
window.saveBatch = async function() {
  const qty = document.getElementById('bQty').value.trim();
  const expiry = document.getElementById('bExpiry').value;
  const note = document.getElementById('bNote').value.trim();
  if(!qty&&!expiry){toast('請填寫數量或期限','err');return;}
  if(!currentUser){openUserModal();return;}
  const batchRef = ref(db,`foods_v2/${batchTargetKey}/batches`);
  await push(batchRef, {qty,expiry,note});
  await update(ref(db,`foods_v2/${batchTargetKey}`), {updatedAt:Date.now(),updatedBy:currentUser});
  closeBatchModal();
  toast('批次已新增','ok');
}
window.deleteBatch = async function(foodKey, batchKey) {
  if(!confirm('確定移除這筆批次？')) return;
  await remove(ref(db,`foods_v2/${foodKey}/batches/${batchKey}`));
  await update(ref(db,`foods_v2/${foodKey}`), {updatedAt:Date.now(),updatedBy:currentUser||'系統'});
  // refresh detail
  const item = foods.find(i=>i._key===foodKey);
  if(item) renderBatchList(item);
  toast('批次已移除','warn');
}

// QUICK USE
window.quickMinus = function(key) {
  if(!currentUser){openUserModal();return;}
  const item = foods.find(i=>i._key===key);
  if(!item) return;
  const bs = getBatches(item).sort((a,b)=>{const da=a.expiry?daysLeft(a.expiry):9999,db2=b.expiry?daysLeft(b.expiry):9999;return da-db2;});
  if(!bs.length) return;
  const eb = bs[0];
  const match = (eb.qty||'').match(/^([\d.]+)(.*)/);
  if(match) {
    const num = parseFloat(match[1])-1;
    if(num<0) return;
    const newQty = num+match[2];
    update(ref(db,`foods_v2/${key}/batches/${eb._bkey}`), {qty:newQty});
    update(ref(db,`foods_v2/${key}`), {updatedAt:Date.now(),updatedBy:currentUser});
    toast(`${item.name} 最早批次 → ${newQty}`,'warn');
  } else { openDetail(key); }
}

window.markEarliestUsed = async function(key, name) {
  if(!currentUser){openUserModal();return;}
  const item = foods.find(i=>i._key===key);
  if(!item) return;
  const bs = getBatches(item).sort((a,b)=>{const da=a.expiry?daysLeft(a.expiry):9999,db2=b.expiry?daysLeft(b.expiry):9999;return da-db2;});
  if(!bs.length) return;
  if(!confirm(`移除「${name}」最早到期的批次（${bs[0].qty||''}）？`)) return;
  await remove(ref(db,`foods_v2/${key}/batches/${bs[0]._bkey}`));
  // if no batches left, remove item
  const remaining = bs.slice(1);
  if(remaining.length===0) { await remove(ref(db,`foods_v2/${key}`)); toast(`「${name}」已全部用完`,'warn'); }
  else { await update(ref(db,`foods_v2/${key}`),{updatedAt:Date.now(),updatedBy:currentUser}); toast(`「${name}」最早批次已用完`,'ok'); }
}

// FOOD MODAL
window.openFoodModal = function(key=null) {
  editFoodKey=key;
  const item=key?foods.find(i=>i._key===key):null;
  document.getElementById('foodModalTitle').textContent=key?'編輯食材':'新增食材';
  document.getElementById('fName').value=item?.name||'';
  document.getElementById('fCat').value=item?.category||'';
  document.getElementById('fLoc').value=item?.location||'';
  document.getElementById('fNote').value=item?.note||'';
  const eb=item?getEarliestBatch(item):null;
  document.getElementById('fQty').value=eb?.qty||'';
  document.getElementById('fExpiry').value=eb?.expiry||'';
  photoBuf=item?.photo||null;
  const prev=document.getElementById('photoPreview'),hint=document.getElementById('photoHint');
  if(photoBuf){prev.src=photoBuf;prev.style.display='block';hint.style.display='none';}
  else{prev.style.display='none';hint.style.display='flex';}
  document.querySelectorAll('.zone-opt').forEach(o=>o.classList.toggle('selected',o.dataset.z===(item?.zone||'冷凍')));
  document.querySelectorAll('[data-h]').forEach(o=>{o.className='toggle-opt';if(o.dataset.h===(item?.house||'新家'))o.classList.add('sel-new');});
  document.querySelectorAll('[data-o]').forEach(o=>{o.className='toggle-opt';const v=item?.opened||'未開封';if(o.dataset.o===v)o.classList.add(v==='已開封'?'sel-open':'sel-sealed');});
  document.getElementById('foodOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),100);
}
window.closeFoodModal=function(){document.getElementById('foodOverlay').classList.remove('open');editFoodKey=null;photoBuf=null;document.getElementById('photoInput').value='';}
window.selZone=function(el){document.querySelectorAll('.zone-opt').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');}
window.selHouse=function(el){document.querySelectorAll('[data-h]').forEach(o=>{o.className='toggle-opt';});el.classList.add('sel-new');}
window.selOpen=function(el){const v=el.dataset.o;document.querySelectorAll('[data-o]').forEach(o=>{o.className='toggle-opt';});el.classList.add(v==='已開封'?'sel-open':'sel-sealed');}
window.handlePhoto=function(e){
  const file=e.target.files[0];if(!file)return;
  const canvas=document.createElement('canvas'),img=new Image(),url=URL.createObjectURL(file);
  img.onload=()=>{const MAX=600;let w=img.width,h=img.height;if(w>h&&w>MAX){h=h*MAX/w;w=MAX;}else if(h>MAX){w=w*MAX/h;h=MAX;}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);photoBuf=canvas.toDataURL('image/jpeg',.75);const prev=document.getElementById('photoPreview');prev.src=photoBuf;prev.style.display='block';document.getElementById('photoHint').style.display='none';URL.revokeObjectURL(url);};img.src=url;
}
window.saveFood=async function(){
  if(!currentUser){openUserModal();return;}
  const name=document.getElementById('fName').value.trim();
  if(!name){toast('請填寫食材名稱','err');return;}
  const zone=document.querySelector('.zone-opt.selected')?.dataset.z||'冷凍';
  const house=document.querySelector('[data-h].sel-new')?.dataset.h||'新家';
  const opened=document.querySelector('[data-o].sel-open,[data-o].sel-sealed')?.dataset.o||'未開封';
  const qty=document.getElementById('fQty').value.trim();
  const expiry=document.getElementById('fExpiry').value;
  const btn=document.getElementById('foodSaveBtn');
  btn.disabled=true;btn.textContent='儲存中…';
  try{
    if(editFoodKey){
      const data={name,zone,house,opened,category:document.getElementById('fCat').value.trim(),location:document.getElementById('fLoc').value.trim(),note:document.getElementById('fNote').value.trim(),photo:photoBuf,updatedAt:Date.now(),updatedBy:currentUser};
      await update(ref(db,`foods_v2/${editFoodKey}`),data);
      toast(`「${name}」已更新`,'ok');
    } else {
      const batches = (qty||expiry)?{b1:{qty,expiry,note:''}}:{};
      await push(foodsRef,{name,zone,house,opened,category:document.getElementById('fCat').value.trim(),location:document.getElementById('fLoc').value.trim(),note:document.getElementById('fNote').value.trim(),photo:photoBuf,batches,addedAt:Date.now(),updatedAt:Date.now(),updatedBy:currentUser});
      toast(`「${name}」已新增`,'ok');
    }
    closeFoodModal();
  }catch(e){toast('儲存失敗','err');}
  btn.disabled=false;btn.textContent='儲存';
}

// MAINT MODAL
window.openMaintModal=function(key=null){
  editMaintKey=key;
  const item=key?maints.find(i=>i._key===key):null;
  document.getElementById('maintModalTitle').textContent=key?'編輯耗材':'新增耗材';
  document.getElementById('mName').value=item?.name||'';
  document.getElementById('mCat').value=item?.category||'';
  document.getElementById('mLoc').value=item?.location||'';
  document.getElementById('mBrand').value=item?.brand||'';
  document.getElementById('mCycle').value=item?.cycle||'';
  document.getElementById('mLastDate').value=item?.lastDate||'';
  document.getElementById('mNote').value=item?.note||'';
  document.querySelectorAll('[data-mh]').forEach(o=>{o.className='toggle-opt';if(o.dataset.mh===(item?.house||'新家'))o.classList.add('sel-new');});
  document.getElementById('maintOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('mName').focus(),100);
}
window.closeMaintModal=function(){document.getElementById('maintOverlay').classList.remove('open');editMaintKey=null;}
window.selMHouseOpt=function(el){document.querySelectorAll('[data-mh]').forEach(o=>{o.className='toggle-opt';});el.classList.add('sel-new');}
window.saveMaint=async function(){
  if(!currentUser){openUserModal();return;}
  const name=document.getElementById('mName').value.trim();
  if(!name){toast('請填寫品項名稱','err');return;}
  const house=document.querySelector('[data-mh].sel-new')?.dataset.mh||'新家';
  const data={name,house,category:document.getElementById('mCat').value.trim(),location:document.getElementById('mLoc').value.trim(),brand:document.getElementById('mBrand').value.trim(),cycle:parseInt(document.getElementById('mCycle').value)||90,lastDate:document.getElementById('mLastDate').value,note:document.getElementById('mNote').value.trim(),updatedAt:Date.now(),updatedBy:currentUser};
  const btn=document.getElementById('maintSaveBtn');btn.disabled=true;btn.textContent='儲存中…';
  try{
    if(editMaintKey){await update(ref(db,`maints/${editMaintKey}`),data);toast(`「${name}」已更新`,'ok');}
    else{await push(maintsRef,{...data,addedAt:Date.now()});toast(`「${name}」已新增`,'ok');}
    closeMaintModal();
  }catch(e){toast('儲存失敗','err');}
  btn.disabled=false;btn.textContent='儲存';
}
window.markMaintDone=async function(key,name){
  if(!currentUser){openUserModal();return;}
  const today=new Date().toISOString().slice(0,10);
  await update(ref(db,`maints/${key}`),{lastDate:today,updatedAt:Date.now(),updatedBy:currentUser});
  toast(`「${name}」已標記更換完成 ✓`,'ok');
}
window.deleteMaint=async function(key,name){
  if(!confirm(`確定刪除「${name}」？`))return;
  await remove(ref(db,`maints/${key}`));
  toast(`已刪除「${name}」`,'warn');
}
window.openMaintDetail=function(key){openMaintModal(key);}

// FILTERS
window.setZone=function(el){filterMode='';activeZone=el.dataset.zone;document.querySelectorAll('[data-zone]').forEach(t=>t.classList.remove('active','house-active'));el.classList.add('active');renderFood();}
window.setHouse=function(el){filterMode='';activeHouse=el.dataset.house;document.querySelectorAll('[data-house]').forEach(t=>t.classList.remove('active','house-active'));el.classList.add('house-active');renderFood();}
window.setMHouse=function(el){activeMHouse=el.dataset.mhouse;document.querySelectorAll('[data-mhouse]').forEach(t=>t.classList.remove('active','house-active'));el.classList.add('house-active');renderMaint();}
window.filterWarn=function(){filterMode='warn';renderFood();}
window.filterExpired=function(){filterMode='expired';renderFood();}

// USER
window.openUserModal=function(){document.getElementById('userOverlay').classList.add('open');document.getElementById('userNameInput').value=currentUser;refreshUserPresets();}
window.confirmUser=function(){
  const name=document.getElementById('userNameInput').value.trim();
  if(!name){toast('請輸入名字','err');return;}
  currentUser=name;localStorage.setItem('food_username',name);
  document.getElementById('userNameDisplay').textContent=name;
  document.getElementById('userOverlay').classList.remove('open');
  push(usersRef,name);
  toast(`歡迎，${name}！`,'ok');
}
function refreshUserPresets(){
  const unique=[...new Set(knownUsers)].filter(Boolean).slice(0,8);
  const saved=localStorage.getItem('food_username');
  document.getElementById('userPresets').innerHTML=unique.map(u=>`<div class="user-preset${u===saved?' selected':''}" onclick="pickUser('${esc(u)}')">${esc(u)}</div>`).join('');
}
window.pickUser=function(name){document.getElementById('userNameInput').value=name;document.querySelectorAll('.user-preset').forEach(p=>p.classList.toggle('selected',p.textContent===name));}

// TOAST
window.toast=function(msg,type='ok'){
  const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),350);},2800);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeFoodModal();closeMaintModal();closeBatchModal();document.getElementById('detailOverlay').classList.remove('open');document.getElementById('userOverlay').classList.remove('open');}});
</script>

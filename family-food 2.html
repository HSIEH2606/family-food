<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭食物管理</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F7F4EF;
  --white: #FFFFFF;
  --green: #3A6B4A;
  --green-mid: #5A8F6A;
  --green-light: #EAF2EC;
  --orange: #D4621A;
  --orange-light: #FDF0E8;
  --red: #C0392B;
  --red-light: #FEF2F2;
  --yellow: #D4A017;
  --yellow-light: #FFFBEB;
  --blue: #2563EB;
  --blue-light: #EFF6FF;
  --purple: #7C3AED;
  --purple-light: #F5F3FF;
  --text: #1C1C1C;
  --text-mid: #4A4A4A;
  --text-muted: #888;
  --border: #E4DDD4;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.07);
  --shadow: 0 3px 12px rgba(0,0,0,.09);
  --shadow-lg: 0 8px 28px rgba(0,0,0,.14);
  --radius: 14px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Segoe UI', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

/* HEADER */
header { background: var(--green); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 10px rgba(0,0,0,.18); }
.logo { font-size: 16px; font-weight: 700; color: white; display: flex; align-items: center; gap: 7px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.sync-badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.sync-badge.online { background: rgba(255,255,255,.15); color: #A7F3D0; }
.sync-badge.offline { background: rgba(255,100,100,.2); color: #FCA5A5; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; }
.sync-badge.online .sync-dot { background: #34D399; animation: pulse 2s infinite; }
.sync-badge.offline .sync-dot { background: #F87171; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.user-btn { background: rgba(255,255,255,.2); color: white; border: none; border-radius: 20px; padding: 4px 11px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.user-btn:hover { background: rgba(255,255,255,.3); }

/* MAIN */
main { max-width: 1100px; margin: 0 auto; padding: 18px 14px 60px; }

/* LOADING */
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; color: var(--text-muted); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* STATS */
.stats { display: flex; gap: 9px; margin-bottom: 18px; flex-wrap: wrap; }
.stat { background: var(--white); border-radius: 12px; padding: 12px 14px; box-shadow: var(--shadow-sm); flex: 1; min-width: 90px; cursor: pointer; transition: box-shadow .15s; }
.stat:hover { box-shadow: var(--shadow); }
.stat-num { font-size: 24px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-top: 3px; }
.stat.green .stat-num { color: var(--green); }
.stat.orange .stat-num { color: var(--orange); }
.stat.red .stat-num { color: var(--red); }
.stat.blue .stat-num { color: var(--blue); }

/* TOOLBAR */
.toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
.search-wrap { position: relative; flex: 1; min-width: 150px; }
.search-wrap input { width: 100%; padding: 9px 12px 9px 34px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--white); outline: none; color: var(--text); transition: border-color .15s; }
.search-wrap input:focus { border-color: var(--green-mid); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 14px; }
.filter-select { padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--white); outline: none; color: var(--text); cursor: pointer; }
.filter-select:focus { border-color: var(--green-mid); }
.btn-add { background: var(--green); color: white; border: none; padding: 9px 16px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background .15s; white-space: nowrap; }
.btn-add:hover { background: #2F5840; }

/* FILTER TABS ROW */
.filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.ftab { padding: 6px 13px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--white); color: var(--text-mid); transition: all .15s; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.ftab.active { color: white; border-color: transparent; }
.ftab.zone-tab.active { background: var(--green); }
.ftab.house-tab.active { background: var(--blue); }
.ftab-cnt { font-size: 10px; padding: 1px 5px; border-radius: 10px; background: var(--green-light); color: var(--green); }
.ftab.active .ftab-cnt { background: rgba(255,255,255,.25); color: white; }

/* GRID */
.food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 13px; }

/* CARD */
.food-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; transition: box-shadow .18s, transform .18s; position: relative; }
.food-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.card-photo { width: 100%; aspect-ratio: 4/3; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 48px; overflow: hidden; position: relative; }
.card-photo img { width: 100%; height: 100%; object-fit: cover; }
.card-badges { position: absolute; top: 8px; left: 8px; display: flex; flex-direction: column; gap: 4px; }
.badge-expired { background: var(--red); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.badge-opened { background: var(--orange); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.badge-house { position: absolute; top: 8px; right: 8px; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.badge-house.new { background: var(--blue); color: white; }
.badge-house.old { background: var(--purple); color: white; }

/* QUICK USE BAR */
.quick-bar { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: #F8FAF8; border-bottom: 1px solid var(--border); }
.quick-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.quick-controls { display: flex; align-items: center; gap: 6px; }
.qty-btn { width: 26px; height: 26px; border-radius: 7px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: var(--text-mid); transition: all .12s; font-weight: 700; }
.qty-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
.qty-btn.minus:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
.qty-num { font-weight: 800; font-size: 15px; min-width: 28px; text-align: center; color: var(--text); }
.btn-used-up { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; border: none; background: var(--red-light); color: var(--red); cursor: pointer; transition: background .12s; }
.btn-used-up:hover { background: #FEE2E2; }

.card-body { padding: 10px 11px 9px; }
.card-name { font-size: 14px; font-weight: 700; margin-bottom: 5px; line-height: 1.3; }
.expiry-bar-wrap { margin-bottom: 6px; }
.expiry-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
.expiry-days { font-weight: 700; font-size: 11px; }
.expiry-days.ok { color: var(--green); }
.expiry-days.warn { color: var(--yellow); }
.expiry-days.urgent { color: var(--orange); }
.expiry-days.expired { color: var(--red); }
.ebar { height: 4px; border-radius: 3px; background: #EEE; overflow: hidden; }
.efill { height: 100%; border-radius: 3px; }
.efill.ok { background: var(--green-mid); }
.efill.warn { background: var(--yellow); }
.efill.urgent { background: var(--orange); }
.efill.expired { background: var(--red); }
.card-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.chip { font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 600; }
.chip-zone { background: var(--green-light); color: var(--green); }
.chip-loc { background: #EEF2FF; color: #4338CA; }
.chip-open { background: var(--orange-light); color: var(--orange); }
.chip-sealed { background: var(--green-light); color: var(--green); }
.card-updated { font-size: 10px; color: var(--text-muted); margin-bottom: 7px; display: flex; align-items: center; gap: 3px; }
.card-actions { display: flex; gap: 5px; }
.card-btn { flex: 1; padding: 6px; border-radius: 8px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; }
.card-btn-edit { background: var(--green-light); color: var(--green); }
.card-btn-edit:hover { background: #D5EAD9; }
.card-btn-del { background: var(--red-light); color: var(--red); }
.card-btn-del:hover { background: #FEE2E2; }

/* EMPTY */
.empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-emoji { font-size: 46px; margin-bottom: 10px; }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(28,28,28,.55); z-index: 300; display: flex; align-items: flex-start; justify-content: center; padding: 14px; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity .2s; }
.overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 500px; padding: 22px; box-shadow: var(--shadow-lg); transform: translateY(16px); transition: transform .22s; margin: auto; }
.overlay.open .modal { transform: translateY(0); }
.modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 17px; font-weight: 800; color: var(--green); }
.modal-close { width: 28px; height: 28px; border-radius: 8px; border: none; background: var(--cream); cursor: pointer; font-size: 16px; color: var(--text-mid); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--border); }
.photo-area { border: 2px dashed var(--border); border-radius: 12px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 14px; position: relative; overflow: hidden; background: var(--cream); transition: border-color .15s; }
.photo-area:hover { border-color: var(--green-mid); }
.photo-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
.photo-hint { font-size: 12px; color: var(--text-muted); text-align: center; pointer-events: none; }
.photo-hint .icon { font-size: 24px; margin-bottom: 2px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row { }
.form-row.full { grid-column: 1/-1; }
.form-row label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
.form-input, .form-select { width: 100%; padding: 9px 10px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 13px; color: var(--text); outline: none; background: var(--white); transition: border-color .15s; font-family: inherit; }
.form-input:focus, .form-select:focus { border-color: var(--green-mid); }
.zone-selector { display: flex; gap: 5px; flex-wrap: wrap; }
.zone-opt { flex: 1; min-width: 55px; padding: 7px 4px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--cream); cursor: pointer; text-align: center; transition: all .15s; font-size: 11px; font-weight: 600; color: var(--text-mid); }
.zone-opt .zicon { font-size: 18px; display: block; margin-bottom: 2px; }
.zone-opt.selected { border-color: var(--green); background: var(--green-light); color: var(--green); }
.toggle-row { display: flex; gap: 8px; }
.toggle-opt { flex: 1; padding: 9px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--cream); cursor: pointer; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-mid); transition: all .15s; }
.toggle-opt.selected-open { border-color: var(--orange); background: var(--orange-light); color: var(--orange); }
.toggle-opt.selected-sealed { border-color: var(--green); background: var(--green-light); color: var(--green); }
.toggle-opt.selected-new { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
.toggle-opt.selected-old { border-color: var(--purple); background: var(--purple-light); color: var(--purple); }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
.btn-cancel { padding: 9px 14px; border-radius: 9px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: var(--white); color: var(--text-mid); cursor: pointer; }
.btn-cancel:hover { background: var(--cream); }
.btn-save { padding: 9px 18px; border-radius: 9px; font-size: 13px; font-weight: 700; border: none; background: var(--green); color: white; cursor: pointer; transition: background .15s; }
.btn-save:hover { background: #2F5840; }
.btn-save:disabled { background: #aaa; cursor: not-allowed; }

/* USER MODAL */
.user-modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 340px; padding: 26px; box-shadow: var(--shadow-lg); margin: auto; }
.user-modal h2 { font-size: 18px; font-weight: 800; color: var(--green); margin-bottom: 6px; }
.user-modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
.user-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.user-preset { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--cream); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-mid); transition: all .15s; }
.user-preset:hover, .user-preset.selected { border-color: var(--green); background: var(--green-light); color: var(--green); }
.user-input-row { display: flex; gap: 8px; }
.user-input-row input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 14px; outline: none; font-family: inherit; }
.user-input-row input:focus { border-color: var(--green-mid); }
.btn-confirm { padding: 9px 18px; border-radius: 9px; font-size: 14px; font-weight: 700; border: none; background: var(--green); color: white; cursor: pointer; }

/* TOASTS */
.toasts { position: fixed; bottom: 18px; right: 18px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; color: white; box-shadow: var(--shadow); transform: translateX(120%); transition: transform .25s ease; max-width: 260px; }
.toast.show { transform: translateX(0); }
.toast.ok { background: var(--green); }
.toast.warn { background: var(--orange); }
.toast.err { background: var(--red); }

@media (max-width: 580px) {
  .food-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .form-grid { grid-template-columns: 1fr; }
}
@media (max-width: 340px) { .food-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo">🥦 家庭食物管理</div>
  <div class="header-right">
    <button class="user-btn" id="userBtn" onclick="openUserModal()">👤 <span id="userNameDisplay">設定名字</span></button>
    <div class="sync-badge offline" id="syncBadge">
      <span class="sync-dot"></span>
      <span id="syncText">連線中</span>
    </div>
  </div>
</header>

<main>
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div>連接資料庫中…</div>
  </div>

  <div id="appContent" style="display:none">
    <!-- Stats -->
    <div class="stats">
      <div class="stat green" onclick="clearFilters()"><div class="stat-num" id="sTotal">0</div><div class="stat-label">食材種類</div></div>
      <div class="stat blue" onclick="clearFilters()"><div class="stat-num" id="sValid">0</div><div class="stat-label">有效食材</div></div>
      <div class="stat orange" onclick="filterWarn()"><div class="stat-num" id="sWarn">0</div><div class="stat-label">3天到期</div></div>
      <div class="stat red" onclick="filterExpired()"><div class="stat-num" id="sExpired">0</div><div class="stat-label">已過期</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜尋食材…" oninput="render()">
      </div>
      <select class="filter-select" id="catFilter" onchange="render()"><option value="">全部類別</option></select>
      <select class="filter-select" id="sortSel" onchange="render()">
        <option value="expiry">依到期日</option>
        <option value="name">依名稱</option>
        <option value="zone">依溫層</option>
        <option value="updated">最新更新</option>
        <option value="added">最新新增</option>
      </select>
      <button class="btn-add" onclick="openModal()">＋ 新增</button>
    </div>

    <!-- Filter tabs -->
    <div class="filter-row" id="zoneTabs">
      <div class="ftab zone-tab active" data-zone="" onclick="setZone(this)">全部 <span class="ftab-cnt" id="cnt-all">0</span></div>
      <div class="ftab zone-tab" data-zone="冷凍" onclick="setZone(this)">❄️ 冷凍 <span class="ftab-cnt" id="cnt-冷凍">0</span></div>
      <div class="ftab zone-tab" data-zone="冷藏" onclick="setZone(this)">🌡️ 冷藏 <span class="ftab-cnt" id="cnt-冷藏">0</span></div>
      <div class="ftab zone-tab" data-zone="常溫" onclick="setZone(this)">🏠 常溫 <span class="ftab-cnt" id="cnt-常溫">0</span></div>
      <div class="ftab zone-tab" data-zone="乾燥" onclick="setZone(this)">🌾 乾燥 <span class="ftab-cnt" id="cnt-乾燥">0</span></div>
    </div>
    <div class="filter-row" id="houseTabs">
      <div class="ftab house-tab active" data-house="" onclick="setHouse(this)">全部家 <span class="ftab-cnt" id="hcnt-all">0</span></div>
      <div class="ftab house-tab" data-house="新家" onclick="setHouse(this)">🏠 新家 <span class="ftab-cnt" id="hcnt-新家">0</span></div>
      <div class="ftab house-tab" data-house="舊家" onclick="setHouse(this)">🏚️ 舊家 <span class="ftab-cnt" id="hcnt-舊家">0</span></div>
    </div>

    <div class="food-grid" id="foodGrid"></div>
  </div>
</main>

<!-- Food Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">新增食材</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="photo-area" id="photoArea">
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
      <div class="photo-hint" id="photoHint"><div class="icon">📷</div><div>點擊上傳照片</div></div>
      <img id="photoPreview" style="display:none">
    </div>
    <div class="form-grid">
      <div class="form-row full">
        <label>食材名稱 *</label>
        <input class="form-input" type="text" id="fName" placeholder="例：雞胸肉">
      </div>
      <div class="form-row full">
        <label>溫層 *</label>
        <div class="zone-selector">
          <div class="zone-opt selected" data-z="冷凍" onclick="selZone(this)"><span class="zicon">❄️</span>冷凍</div>
          <div class="zone-opt" data-z="冷藏" onclick="selZone(this)"><span class="zicon">🌡️</span>冷藏</div>
          <div class="zone-opt" data-z="常溫" onclick="selZone(this)"><span class="zicon">🏠</span>常溫</div>
          <div class="zone-opt" data-z="乾燥" onclick="selZone(this)"><span class="zicon">🌾</span>乾燥</div>
        </div>
      </div>
      <div class="form-row full">
        <label>存放位置</label>
        <div class="toggle-row">
          <div class="toggle-opt selected-new" data-h="新家" onclick="selHouse(this)">🏠 新家</div>
          <div class="toggle-opt" data-h="舊家" onclick="selHouse(this)">🏚️ 舊家</div>
        </div>
      </div>
      <div class="form-row full">
        <label>開封狀態</label>
        <div class="toggle-row">
          <div class="toggle-opt selected-sealed" data-o="未開封" onclick="selOpen(this)">🔒 未開封</div>
          <div class="toggle-opt" data-o="已開封" onclick="selOpen(this)">📦 已開封</div>
        </div>
      </div>
      <div class="form-row">
        <label>類別</label>
        <input class="form-input" type="text" id="fCat" placeholder="例：肉類" list="catDL">
        <datalist id="catDL"></datalist>
      </div>
      <div class="form-row">
        <label>細部位置</label>
        <input class="form-input" type="text" id="fLoc" placeholder="例：冰箱上層">
      </div>
      <div class="form-row">
        <label>數量</label>
        <input class="form-input" type="text" id="fQty" placeholder="例：3包">
      </div>
      <div class="form-row">
        <label>保存期限</label>
        <input class="form-input" type="date" id="fExpiry">
      </div>
      <div class="form-row full">
        <label>備註</label>
        <input class="form-input" type="text" id="fNote" placeholder="料理建議、購買來源…">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="saveBtn" onclick="saveItem()">儲存</button>
    </div>
  </div>
</div>

<!-- User Modal -->
<div class="overlay" id="userOverlay" onclick="userOverlayClick(event)">
  <div class="user-modal">
    <h2>你是誰？👋</h2>
    <p>設定你的名字，讓家人知道是誰更新了食材</p>
    <div class="user-presets" id="userPresets"></div>
    <div class="user-input-row">
      <input type="text" id="userNameInput" placeholder="輸入你的名字" maxlength="10">
      <button class="btn-confirm" onclick="confirmUser()">確定</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyARi04N76FQgIJjRulKZGbg-xASHL7GzCA",
  authDomain: "family-food-2ce0d.firebaseapp.com",
  databaseURL: "https://family-food-2ce0d-default-rtdb.firebaseio.com",
  projectId: "family-food-2ce0d",
  storageBucket: "family-food-2ce0d.firebasestorage.app",
  messagingSenderId: "250652722667",
  appId: "1:250652722667:web:6a1c0c09aa01ef66bf45ae"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const itemsRef = ref(db, 'foods');
const usersRef = ref(db, 'users');

// STATE
let items = [];
let editId = null;
let activeZone = '';
let activeHouse = '';
let filterMode = ''; // 'warn' | 'expired' | ''
let photoBuf = null;
let currentUser = localStorage.getItem('food_username') || '';
let knownUsers = [];

const ZONES = ['冷凍','冷藏','常溫','乾燥'];
const ZONE_ICONS = {'冷凍':'❄️','冷藏':'🌡️','常溫':'🏠','乾燥':'🌾'};

// ── INIT ──
if (!currentUser) { setTimeout(() => openUserModal(), 500); }
else { document.getElementById('userNameDisplay').textContent = currentUser; }

// ── FIREBASE ──
onValue(itemsRef, (snap) => {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
  const badge = document.getElementById('syncBadge');
  badge.className = 'sync-badge online';
  document.getElementById('syncText').textContent = '即時同步';
  const data = snap.val();
  items = data ? Object.entries(data).map(([k,v]) => ({...v, _key:k})) : [];
  if (items.length === 0) seedData();
  render();
}, () => {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
  document.getElementById('syncBadge').className = 'sync-badge offline';
  document.getElementById('syncText').textContent = '連線失敗';
  toast('無法連接資料庫', 'err');
});

onValue(usersRef, (snap) => {
  const data = snap.val();
  knownUsers = data ? Object.values(data) : [];
  refreshUserPresets();
});

function seedData() {
  const d = (n) => { const x=new Date(); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); };
  const seeds = [
    {name:'雞胸肉',zone:'冷凍',house:'新家',category:'肉類',location:'冰箱下層',qty:'3 包',expiry:d(60),opened:'未開封',note:'已分裝',photo:null},
    {name:'牛奶',zone:'冷藏',house:'新家',category:'乳製品',location:'冰箱門架',qty:'1 瓶',expiry:d(5),opened:'已開封',note:'',photo:null},
    {name:'雞蛋',zone:'冷藏',house:'新家',category:'蛋類',location:'蛋架',qty:'8 顆',expiry:d(14),opened:'未開封',note:'',photo:null},
    {name:'白米',zone:'乾燥',house:'舊家',category:'主食',location:'米桶',qty:'5 kg',expiry:d(180),opened:'未開封',note:'',photo:null},
    {name:'花椰菜',zone:'冷藏',house:'舊家',category:'蔬菜',location:'冰箱上層',qty:'1 顆',expiry:d(-1),opened:'未開封',note:'',photo:null},
  ].map(s => ({...s, addedAt:Date.now(), updatedAt:Date.now(), updatedBy:'系統'}));
  seeds.forEach(s => push(itemsRef, s));
}

// ── UTILS ──
function daysLeft(exp) { if(!exp) return null; return Math.floor((new Date(exp)-new Date())/86400000); }
function expClass(d) { if(d===null) return 'ok'; if(d<0) return 'expired'; if(d<=1) return 'urgent'; if(d<=3) return 'warn'; return 'ok'; }
function expText(d) { if(d===null) return '未設定'; if(d<0) return `過期${Math.abs(d)}天`; if(d===0) return '今天到期'; if(d===1) return '明天到期'; return `剩${d}天`; }
function catEmoji(cat) { return ({'肉類':'🥩','魚類':'🐟','海鮮':'🦐','蔬菜':'🥦','水果':'🍎','乳製品':'🥛','蛋類':'🥚','主食':'🍚','調味料':'🧂','飲料':'🧃','零食':'🍪','麵包':'🍞'})[cat]||'🥡'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(ts) {
  if(!ts) return '';
  const diff = Math.floor((Date.now()-ts)/1000);
  if(diff<60) return '剛剛';
  if(diff<3600) return `${Math.floor(diff/60)}分鐘前`;
  if(diff<86400) return `${Math.floor(diff/3600)}小時前`;
  if(diff<604800) return `${Math.floor(diff/86400)}天前`;
  return new Date(ts).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
}

// ── RENDER ──
window.render = function() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const sort = document.getElementById('sortSel').value;

  let list = items.filter(i => {
    const mQ = !q || (i.name||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q)||(i.location||'').toLowerCase().includes(q);
    const mC = !cat || i.category===cat;
    const mZ = !activeZone || i.zone===activeZone;
    const mH = !activeHouse || i.house===activeHouse;
    const d = daysLeft(i.expiry);
    const mF = !filterMode || (filterMode==='warn'&&d!==null&&d>=0&&d<=3) || (filterMode==='expired'&&d!==null&&d<0);
    return mQ&&mC&&mZ&&mH&&mF;
  });

  list.sort((a,b) => {
    if(sort==='expiry') { const da=daysLeft(a.expiry)??9999,db=daysLeft(b.expiry)??9999; return da-db; }
    if(sort==='name') return (a.name||'').localeCompare(b.name||'','zh-TW');
    if(sort==='zone') return ZONES.indexOf(a.zone)-ZONES.indexOf(b.zone);
    if(sort==='updated') return (b.updatedAt||0)-(a.updatedAt||0);
    return (b.addedAt||0)-(a.addedAt||0);
  });

  // Stats
  document.getElementById('sTotal').textContent = items.length;
  document.getElementById('sValid').textContent = items.filter(i=>{const d=daysLeft(i.expiry);return d===null||d>=0;}).length;
  document.getElementById('sWarn').textContent = items.filter(i=>{const d=daysLeft(i.expiry);return d!==null&&d>=0&&d<=3;}).length;
  document.getElementById('sExpired').textContent = items.filter(i=>{const d=daysLeft(i.expiry);return d!==null&&d<0;}).length;

  // Zone / house counts
  document.getElementById('cnt-all').textContent = items.length;
  ZONES.forEach(z=>{const el=document.getElementById('cnt-'+z);if(el)el.textContent=items.filter(i=>i.zone===z).length;});
  document.getElementById('hcnt-all').textContent = items.length;
  ['新家','舊家'].forEach(h=>{const el=document.getElementById('hcnt-'+h);if(el)el.textContent=items.filter(i=>i.house===h).length;});

  // Category
  const cats = [...new Set(items.map(i=>i.category).filter(Boolean))].sort();
  const cf = document.getElementById('catFilter');
  const prev=cf.value;
  cf.innerHTML='<option value="">全部類別</option>'+cats.map(c=>`<option value="${esc(c)}"${c===prev?' selected':''}>${esc(c)}</option>`).join('');
  document.getElementById('catDL').innerHTML=cats.map(c=>`<option value="${esc(c)}">`).join('');

  // Cards
  const grid = document.getElementById('foodGrid');
  if(!list.length){grid.innerHTML=`<div class="empty"><div class="empty-emoji">🥡</div><p>沒有符合的食材</p></div>`;return;}

  grid.innerHTML = list.map(item => {
    const d = daysLeft(item.expiry);
    const cls = expClass(d);
    const fill = d===null?100:Math.max(3,Math.min(100,(d/90)*100));
    const photo = item.photo?`<img src="${item.photo}" alt="">`:(catEmoji(item.category));
    const qtyNum = parseFloat(item.qty)||0;
    const hasNum = item.qty && /\d/.test(item.qty);

    return `<div class="food-card">
      <div class="card-photo">${photo}
        <div class="card-badges">
          ${d!==null&&d<0?`<span class="badge-expired">已過期</span>`:''}
          ${item.opened==='已開封'?`<span class="badge-opened">已開封</span>`:''}
        </div>
        <span class="badge-house ${item.house==='新家'?'new':'old'}">${item.house==='新家'?'🏠 新家':'🏚️ 舊家'}</span>
      </div>
      <div class="quick-bar">
        <span class="quick-label">快速使用</span>
        <div class="quick-controls">
          <button class="qty-btn minus" onclick="quickChange('${item._key}','${esc(item.name)}','${esc(item.qty||'')}', -1)">−</button>
          <span class="qty-num">${esc(item.qty||'—')}</span>
          <button class="qty-btn" onclick="quickChange('${item._key}','${esc(item.name)}','${esc(item.qty||'')}', 1)">＋</button>
          <button class="btn-used-up" onclick="markUsedUp('${item._key}','${esc(item.name)}')">用完</button>
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${esc(item.name)}</div>
        ${item.expiry?`<div class="expiry-bar-wrap">
          <div class="expiry-row"><span>保存期限</span><span class="expiry-days ${cls}">${expText(d)}</span></div>
          <div class="ebar"><div class="efill ${cls}" style="width:${fill}%"></div></div>
        </div>`:''}
        <div class="card-chips">
          <span class="chip chip-zone">${ZONE_ICONS[item.zone]||''} ${esc(item.zone)}</span>
          ${item.location?`<span class="chip chip-loc">📍${esc(item.location)}</span>`:''}
          <span class="chip ${item.opened==='已開封'?'chip-open':'chip-sealed'}">${item.opened==='已開封'?'📦 已開封':'🔒 未開封'}</span>
        </div>
        ${item.updatedBy?`<div class="card-updated">✏️ ${esc(item.updatedBy)} · ${timeAgo(item.updatedAt)}</div>`:''}
        <div class="card-actions">
          <button class="card-btn card-btn-edit" onclick="openModal('${item._key}')">編輯</button>
          <button class="card-btn card-btn-del" onclick="deleteItem('${item._key}','${esc(item.name)}')">刪除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── QUICK USE ──
window.quickChange = async function(key, name, qtyStr, delta) {
  if (!currentUser) { openUserModal(); return; }
  const item = items.find(i=>i._key===key);
  if(!item) return;
  // Try to parse number from qty string
  const match = (item.qty||'').match(/^([\d.]+)(.*)/);
  let newQty;
  if(match) {
    const num = parseFloat(match[1]) + delta;
    if(num < 0) return;
    newQty = num + match[2];
  } else {
    // Can't parse, just show edit
    openModal(key); return;
  }
  await update(ref(db,`foods/${key}`), {qty:newQty, updatedAt:Date.now(), updatedBy:currentUser});
  toast(`${name} → ${newQty}`, delta>0?'ok':'warn');
}

window.markUsedUp = async function(key, name) {
  if(!currentUser){openUserModal();return;}
  if(!confirm(`「${name}」已用完，要刪除嗎？`)) return;
  await remove(ref(db,`foods/${key}`));
  toast(`「${name}」已用完並移除`, 'warn');
}

// ── FILTERS ──
window.setZone = function(el) {
  filterMode='';
  activeZone=el.dataset.zone;
  document.querySelectorAll('.zone-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}
window.setHouse = function(el) {
  filterMode='';
  activeHouse=el.dataset.house;
  document.querySelectorAll('.house-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}
window.clearFilters = function() { filterMode=''; render(); }
window.filterWarn = function() { filterMode='warn'; render(); }
window.filterExpired = function() { filterMode='expired'; render(); }

// ── MODAL ──
window.openModal = function(key=null) {
  editId=key;
  const item=key?items.find(i=>i._key===key):null;
  document.getElementById('modalTitle').textContent=key?'編輯食材':'新增食材';
  document.getElementById('fName').value=item?.name||'';
  document.getElementById('fCat').value=item?.category||'';
  document.getElementById('fLoc').value=item?.location||'';
  document.getElementById('fQty').value=item?.qty||'';
  document.getElementById('fExpiry').value=item?.expiry||'';
  document.getElementById('fNote').value=item?.note||'';
  photoBuf=item?.photo||null;
  const prev=document.getElementById('photoPreview');
  const hint=document.getElementById('photoHint');
  if(photoBuf){prev.src=photoBuf;prev.style.display='block';hint.style.display='none';}
  else{prev.style.display='none';hint.style.display='flex';}
  // Zone
  document.querySelectorAll('.zone-opt').forEach(o=>o.classList.toggle('selected',o.dataset.z===(item?.zone||'冷凍')));
  // House
  document.querySelectorAll('[data-h]').forEach(o=>{
    o.className='toggle-opt';
    if(o.dataset.h===(item?.house||'新家')) o.classList.add('selected-new');
  });
  // Opened
  document.querySelectorAll('[data-o]').forEach(o=>{
    o.className='toggle-opt';
    const val=item?.opened||'未開封';
    if(o.dataset.o===val) o.classList.add(val==='已開封'?'selected-open':'selected-sealed');
  });
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),100);
}
window.closeModal=function(){document.getElementById('overlay').classList.remove('open');editId=null;photoBuf=null;document.getElementById('photoInput').value='';}
window.overlayClick=function(e){if(e.target===document.getElementById('overlay'))closeModal();}
window.selZone=function(el){document.querySelectorAll('.zone-opt').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');}
window.selHouse=function(el){document.querySelectorAll('[data-h]').forEach(o=>{o.className='toggle-opt';});el.classList.add('selected-new');}
window.selOpen=function(el){
  const val=el.dataset.o;
  document.querySelectorAll('[data-o]').forEach(o=>{o.className='toggle-opt';});
  el.classList.add(val==='已開封'?'selected-open':'selected-sealed');
}
window.handlePhoto=function(e){
  const file=e.target.files[0]; if(!file) return;
  const canvas=document.createElement('canvas');
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const MAX=600; let w=img.width,h=img.height;
    if(w>h&&w>MAX){h=h*MAX/w;w=MAX;}else if(h>MAX){w=w*MAX/h;h=MAX;}
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    photoBuf=canvas.toDataURL('image/jpeg',.75);
    const prev=document.getElementById('photoPreview');
    prev.src=photoBuf;prev.style.display='block';
    document.getElementById('photoHint').style.display='none';
    URL.revokeObjectURL(url);
  };img.src=url;
}
window.saveItem=async function(){
  if(!currentUser){openUserModal();return;}
  const name=document.getElementById('fName').value.trim();
  if(!name){toast('請填寫食材名稱','err');return;}
  const zone=document.querySelector('.zone-opt.selected')?.dataset.z||'冷凍';
  const house=document.querySelector('[data-h].selected-new')?.dataset.h||'新家';
  const opened=document.querySelector('[data-o].selected-open, [data-o].selected-sealed')?.dataset.o||'未開封';
  const data={
    name,zone,house,opened,
    category:document.getElementById('fCat').value.trim(),
    location:document.getElementById('fLoc').value.trim(),
    qty:document.getElementById('fQty').value.trim(),
    expiry:document.getElementById('fExpiry').value,
    note:document.getElementById('fNote').value.trim(),
    photo:photoBuf,
    updatedAt:Date.now(),
    updatedBy:currentUser,
    addedAt:editId?(items.find(i=>i._key===editId)?.addedAt||Date.now()):Date.now()
  };
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='儲存中…';
  try{
    if(editId){await update(ref(db,`foods/${editId}`),data);toast(`「${name}」已更新`,'ok');}
    else{await push(itemsRef,data);toast(`「${name}」已新增`,'ok');}
    closeModal();
  }catch(e){toast('儲存失敗','err');}
  btn.disabled=false;btn.textContent='儲存';
}
window.deleteItem=async function(key,name){
  if(!confirm(`確定刪除「${name}」？`))return;
  try{await remove(ref(db,`foods/${key}`));toast(`已刪除「${name}」`,'warn');}
  catch(e){toast('刪除失敗','err');}
}

// ── USER ──
window.openUserModal=function(){document.getElementById('userOverlay').classList.add('open');document.getElementById('userNameInput').value=currentUser;refreshUserPresets();}
window.userOverlayClick=function(e){if(e.target===document.getElementById('userOverlay')&&currentUser)document.getElementById('userOverlay').classList.remove('open');}
window.confirmUser=function(){
  const name=document.getElementById('userNameInput').value.trim();
  if(!name){toast('請輸入名字','err');return;}
  currentUser=name;
  localStorage.setItem('food_username',name);
  document.getElementById('userNameDisplay').textContent=name;
  document.getElementById('userOverlay').classList.remove('open');
  // Save to Firebase users list
  push(usersRef, name);
  toast(`歡迎，${name}！`,'ok');
}
function refreshUserPresets(){
  const unique=[...new Set(knownUsers)].filter(Boolean).slice(0,8);
  const saved=localStorage.getItem('food_username');
  document.getElementById('userPresets').innerHTML=unique.map(u=>`<div class="user-preset${u===saved?' selected':''}" onclick="pickUser('${esc(u)}')">${esc(u)}</div>`).join('');
}
window.pickUser=function(name){
  document.getElementById('userNameInput').value=name;
  document.querySelectorAll('.user-preset').forEach(p=>p.classList.toggle('selected',p.textContent===name));
}

// ── TOAST ──
window.toast=function(msg,type='ok'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),350);},2800);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();document.getElementById('userOverlay').classList.remove('open');}});
</script>
